<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Route Optimizer – Live Map System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
/* ─── Reset & Variables ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0e1a;
  --surface:  #111827;
  --card:     #161e2e;
  --border:   #1e2d47;
  --accent:   #00d4ff;
  --accent2:  #7c3aed;
  --green:    #10b981;
  --orange:   #f59e0b;
  --red:      #ef4444;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --font-ui:  'Syne', sans-serif;
  --font-mono:'Space Mono', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  overflow: hidden;
}

/* ─── Layout ────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 14px;
}
header .logo {
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--accent);
}
header .logo span { color: var(--text); }
header .tag {
  font-family: var(--font-mono);
  font-size: .65rem;
  background: var(--border);
  padding: 3px 8px;
  border-radius: 4px;
  color: var(--muted);
}
header .status-badge {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .8rem;
  color: var(--green);
}

.main {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 0;
  height: calc(100vh - 57px);
}

/* ─── Sidebar ───────────────────────────────────────────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.section-title {
  font-size: .65rem;
  font-family: var(--font-mono);
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

/* ─── Form Controls ─────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-size: .75rem;
  font-family: var(--font-mono);
  color: var(--muted);
  letter-spacing: .5px;
}
.field input {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-ui);
  font-size: .9rem;
  padding: 10px 14px;
  width: 100%;
  outline: none;
}

/* algo selector */
.algo-pills { display: flex; gap: 8px; }
.pill {
  flex: 1; text-align: center; padding: 8px 10px; border-radius: 8px;
  border: 1px solid var(--border); font-size: .78rem; font-family: var(--font-mono);
  cursor: pointer; transition: all .2s; color: var(--muted); background: var(--card);
  user-select: none;
}
.pill.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,.08); }

/* Buttons */
.btn {
  border: none; border-radius: 10px; padding: 12px 20px; font-family: var(--font-ui);
  font-weight: 600; font-size: .9rem; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), #0099cc); color: #000; width: 100%; }
.btn-primary:hover { opacity: .9; transform: translateY(-1px); }

.btn-sm {
  background: var(--card); border: 1px solid var(--border); color: var(--muted);
  font-size: .78rem; padding: 7px 12px; border-radius: 7px; cursor: pointer; transition: all 0.2s;
}
.btn-sm:hover { border-color: var(--accent); color: var(--text); }

.traffic-controls { display: flex; gap: 8px; }
.traffic-controls .btn-sm { flex: 1; }

/* ─── Results ───────────────────────────────────────────────── */
.results-panel { display: flex; flex-direction: column; gap: 14px; }
.result-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
}
.result-card .algo-label {
  font-family: var(--font-mono); font-size: .7rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px;
}
.stats-row { display: flex; gap: 10px; margin-bottom: 12px; }
.stat { flex: 1; background: var(--surface); border-radius: 8px; padding: 8px 10px; text-align: center; }
.stat .val { font-family: var(--font-mono); font-size: 1.05rem; font-weight: 700; color: var(--text); }
.stat .lbl { font-size: .62rem; color: var(--muted); margin-top: 2px; }

.empty-state { text-align: center; padding: 24px 12px; color: var(--muted); font-size: .82rem; line-height: 1.6; }

/* ─── Map Panel ─────────────────────────────────────────────── */
#map { width: 100%; height: 100%; background: var(--bg); }
</style>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAq-G5NW-dwKT7t6eJh55aHr3W4yEe7ho4&callback=initMap" async defer></script>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Route<span>Optimizer</span></div>
    <span class="tag">v4.0 · Full City Grid</span>
    <div class="status-badge" id="locationStatus">
      🟢 Location Active
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">

      <div>
        <div class="section-title">Route Planning</div>
        
        <div class="field" style="margin-bottom: 12px;">
          <label>📍 Source</label>
          <div style="display:flex; gap:6px;">
            <input type="text" id="sourceText" readonly placeholder="Click 'Map' or 'Me'" style="flex:1; font-size:0.8rem;">
            <button class="btn-sm" onclick="setClickMode('source')" style="background:var(--accent); color:#000; font-weight:600;">🎯 Map</button>
            <button class="btn-sm" onclick="useLiveLocation('source')" title="Use Live Location">📍 Me</button>
          </div>
        </div>

        <div class="field">
          <label>🏁 Destination</label>
          <div style="display:flex; gap:6px;">
            <input type="text" id="destText" readonly placeholder="Click 'Map' or 'Me'" style="flex:1; font-size:0.8rem;">
            <button class="btn-sm" onclick="setClickMode('dest')" style="background:var(--accent2); color:#fff; font-weight:600;">🎯 Map</button>
            <button class="btn-sm" onclick="useLiveLocation('dest')" title="Use Live Location">📍 Me</button>
          </div>
        </div>
        
        <div id="clickModeStatus" style="font-size:0.75rem; color:var(--orange); margin-top:10px; display:none; background: rgba(245, 158, 11, 0.1); padding: 8px; border-radius: 6px; border: 1px solid var(--orange);">
          👆 Click anywhere on the map to drop a pin...
        </div>
      </div>

      <div>
        <div class="section-title">Algorithm</div>
        <div class="algo-pills">
          <div class="pill active" data-algo="both" onclick="selectAlgo(this)">Both</div>
          <div class="pill" data-algo="dijkstra" onclick="selectAlgo(this)">Dijkstra</div>
          <div class="pill" data-algo="astar" onclick="selectAlgo(this)">A★</div>
        </div>
      </div>

      <button class="btn btn-primary" onclick="findRoute()">
        🔍 Find Best Route
      </button>

      <div>
        <div class="section-title">Traffic Simulation</div>
        <div class="traffic-controls">
          <button class="btn-sm" onclick="updateTraffic(0.3)">🟢 Light</button>
          <button class="btn-sm" onclick="updateTraffic(0.65)">🟡 Med</button>
          <button class="btn-sm" onclick="updateTraffic(1.0)">🔴 Heavy</button>
          <button class="btn-sm" onclick="resetTraffic()">↺ Reset</button>
        </div>
      </div>

      <div class="results-panel" id="resultsPanel">
        <div class="empty-state">
          Set a source and destination,<br>then click <strong>Find Best Route</strong>
        </div>
      </div>

    </aside>

    <div id="map"></div>
  </div>
</div>

<script>
const API_BASE = 'http://localhost:5000';

let map;
let nodes = [];
let edges = [];
let selectedAlgo = 'both';

// Google Maps objects
let mapMarkers = [];
let mapPolylines = [];
let userLocationMarker = null;

// Custom Interaction Variables
let clickMode = null; 
let sourceCoords = null;
let destCoords = null;
let sourcePin = null;
let destPin = null;

// ── Map Initialization ──
async function initMap() {
  // Define the strict geographical boundaries of Ludhiana
  const LUDHIANA_BOUNDS = {
    north: 30.9600, 
    south: 30.8500, 
    west: 75.7600,  
    east: 75.9200   
  };

  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 13,
    minZoom: 12, 
    center: { lat: 30.9009, lng: 75.8572 }, 
    disableDefaultUI: true,
    zoomControl: true,
    restriction: {
      latLngBounds: LUDHIANA_BOUNDS,
      strictBounds: false, 
    },
    styles: [
      { "elementType": "geometry", "stylers": [{ "color": "#242f3e" }] },
      { "elementType": "labels.text.stroke", "stylers": [{ "color": "#242f3e" }] },
      { "elementType": "labels.text.fill", "stylers": [{ "color": "#746855" }] },
      { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#38414e" }] },
      { "featureType": "road", "elementType": "geometry.stroke", "stylers": [{ "color": "#212a37" }] },
      { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#17263c" }] }
    ]
  });

  // Listen for clicks on the map to drop pins
  map.addListener("click", (mapsMouseEvent) => {
    if (!clickMode) return;
    
    const latLng = mapsMouseEvent.latLng;
    const coords = { lat: latLng.lat(), lng: latLng.lng() };

    if (clickMode === 'source') {
      sourceCoords = coords;
      document.getElementById('sourceText').value = `${coords.lat.toFixed(4)}, ${coords.lng.toFixed(4)}`;
      if (sourcePin) sourcePin.setMap(null);
      sourcePin = new google.maps.Marker({ 
          position: latLng, map: map, 
          icon: { url: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png" }
      });
    } else if (clickMode === 'dest') {
      destCoords = coords;
      document.getElementById('destText').value = `${coords.lat.toFixed(4)}, ${coords.lng.toFixed(4)}`;
      if (destPin) destPin.setMap(null);
      destPin = new google.maps.Marker({ 
          position: latLng, map: map, 
          icon: { url: "http://maps.google.com/mapfiles/ms/icons/purple-dot.png" }
      });
    }
    
    clickMode = null;
    document.getElementById('clickModeStatus').style.display = 'none';
  });

  await loadGraphData();
  startLiveLocation();
}

// ── UI Interaction ──
function setClickMode(mode) {
  clickMode = mode;
  document.getElementById('clickModeStatus').style.display = 'block';
  document.getElementById('clickModeStatus').innerHTML = `👆 Click anywhere on the map to drop the <b>${mode}</b> pin...`;
}

function useLiveLocation(mode) {
  if (!userLocationMarker) {
    alert("Still acquiring GPS signal. Please ensure location permissions are granted in your browser.");
    return;
  }
  
  const pos = userLocationMarker.getPosition();
  const coords = { lat: pos.lat(), lng: pos.lng() };

  if (mode === 'source') {
    sourceCoords = coords;
    document.getElementById('sourceText').value = "My Live Location";
    if (sourcePin) sourcePin.setMap(null);
  } else {
    destCoords = coords;
    document.getElementById('destText').value = "My Live Location";
    if (destPin) destPin.setMap(null);
  }
  map.panTo(pos);
}

function selectAlgo(el) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  selectedAlgo = el.dataset.algo;
}

// ── Live Location Tracker ──
function startLiveLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      (position) => {
        const pos = { lat: position.coords.latitude, lng: position.coords.longitude };
        document.getElementById('locationStatus').innerHTML = "🟢 Location Active";
        document.getElementById('locationStatus').style.color = "var(--green)";
        
        if (!userLocationMarker) {
          userLocationMarker = new google.maps.Marker({
            position: pos,
            map: map,
            icon: { 
                path: google.maps.SymbolPath.CIRCLE, scale: 7, 
                fillColor: '#10b981', fillOpacity: 1, 
                strokeColor: '#ffffff', strokeWeight: 2 
            },
            title: "Your Location",
            zIndex: 999
          });
        } else {
          userLocationMarker.setPosition(pos);
        }
      },
      (error) => {
          document.getElementById('locationStatus').innerHTML = "🔴 Location Error";
          document.getElementById('locationStatus').style.color = "var(--red)";
      },
      { enableHighAccuracy: true }
    );
  } else {
      document.getElementById('locationStatus').innerHTML = "🔴 GPS Not Supported";
      document.getElementById('locationStatus').style.color = "var(--red)";
  }
}

// ── Data & Rendering ──
async function loadGraphData() {
  try {
      const resp = await fetch(`${API_BASE}/graph-data`);
      const data = await resp.json();
      nodes = data.nodes; edges = data.edges;
  } catch (e) {
      console.error("Backend not running. Please start app.py");
  }
}

function clearMapRenders() {
  mapMarkers.forEach(m => m.setMap(null));
  mapPolylines.forEach(p => p.setMap(null));
  mapMarkers = []; mapPolylines = [];
}

function drawNetworkOnMap(result = null) {
  clearMapRenders();
  const nodeDict = {};
  
  // Build a lookup dictionary for coordinates
  nodes.forEach(n => { nodeDict[n.id] = { lat: n.lat, lng: n.lng }; });

  if (!result) return; 

  const dPath = result?.dijkstra?.path || [];
  const aPath = result?.astar?.path || [];

  // Draw Dijkstra Path (Blue)
  if (dPath.length > 0) {
    const dCoords = dPath.map(nodeId => nodeDict[nodeId]);
    const dLine = new google.maps.Polyline({
      path: dCoords,
      geodesic: true,
      strokeColor: '#00d4ff', 
      strokeOpacity: 0.8,
      strokeWeight: 6,
      zIndex: 9
    });
    dLine.setMap(map);
    mapPolylines.push(dLine);
  }

  // Draw A* Path (Purple)
  if (aPath.length > 0) {
    const aCoords = aPath.map(nodeId => nodeDict[nodeId]);
    const aLine = new google.maps.Polyline({
      path: aCoords,
      geodesic: true,
      strokeColor: '#7c3aed', 
      strokeOpacity: 0.8,
      strokeWeight: 6,
      zIndex: 10 
    });
    aLine.setMap(map);
    mapPolylines.push(aLine);
  }

  // Draw Source and Destination Pins for the snapped route
  if (dPath.length > 0) {
     const startNode = nodeDict[dPath[0]];
     const endNode = nodeDict[dPath[dPath.length - 1]];
     
     mapMarkers.push(new google.maps.Marker({
         position: startNode, map: map, title: "Snapped Start",
         icon: { path: google.maps.SymbolPath.CIRCLE, scale: 6, fillColor: '#10b981', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }
     }));
     mapMarkers.push(new google.maps.Marker({
         position: endNode, map: map, title: "Snapped End",
         icon: { path: google.maps.SymbolPath.CIRCLE, scale: 6, fillColor: '#ef4444', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }
     }));
  }
}

// ── Routing logic ──
async function findRoute() {
  if (!sourceCoords || !destCoords) {
    alert("Please set both a Source and a Destination on the map first!");
    return;
  }

  try {
      const resp = await fetch(`${API_BASE}/route`, {
        method: 'POST', 
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ 
            source_coords: sourceCoords, 
            dest_coords: destCoords, 
            algorithm: selectedAlgo 
        })
      });
      
      if (!resp.ok) {
          const errData = await resp.json();
          alert("Server Error: " + (errData.error || "Unknown issue"));
          return;
      }
      
      const data = await resp.json();
      
      let html = `<div style="background:var(--surface); padding:10px; border-radius:8px; border:1px solid var(--border); font-size:0.75rem; color:var(--muted); margin-bottom:10px;">
                    <strong style="color:var(--text)">Route Calculated Successfully!</strong>
                  </div>`;

      if (data.dijkstra) {
          html += `<div class="result-card">
                      <div class="algo-label" style="color:var(--accent)">Dijkstra</div>
                      <div class="stats-row">
                          <div class="stat"><div class="val">${data.dijkstra.total_distance} km</div><div class="lbl">Distance</div></div>
                          <div class="stat"><div class="val">${data.dijkstra.total_time} m</div><div class="lbl">Est. Time</div></div>
                      </div>
                   </div>`;
      }
      if (data.astar) {
          html += `<div class="result-card">
                      <div class="algo-label" style="color:var(--accent2)">A* Algorithm</div>
                      <div class="stats-row">
                          <div class="stat"><div class="val">${data.astar.total_distance} km</div><div class="lbl">Distance</div></div>
                          <div class="stat"><div class="val">${data.astar.total_time} m</div><div class="lbl">Est. Time</div></div>
                      </div>
                   </div>`;
      }
      
      if (data.comparison) {
          html += `<div style="margin-top:10px; font-size:0.8rem; color:var(--text); background:rgba(0,212,255,0.1); padding:10px; border-radius:8px; border:1px solid var(--accent);">
                    ⚡ <strong>Comparison:</strong><br>${data.comparison.verdict}
                   </div>`;
      }
      
      document.getElementById('resultsPanel').innerHTML = html;
      drawNetworkOnMap(data);

  } catch (e) {
      alert("Failed to connect! Ensure your Python Flask server is running.");
  }
}

// ── Traffic Sim ──
async function updateTraffic(intensity) {
  try {
      await fetch(`${API_BASE}/update-traffic`, { 
          method: 'POST', 
          headers: {'Content-Type':'application/json'}, 
          body: JSON.stringify({ intensity }) 
      });
      // Re-fetch route if one is already calculated
      if (sourceCoords && destCoords && mapPolylines.length > 0) {
          findRoute();
      }
  } catch(e) {}
}

async function resetTraffic() {
  try {
      await fetch(`${API_BASE}/reset-traffic`, { method: 'POST' });
      if (sourceCoords && destCoords && mapPolylines.length > 0) {
          findRoute();
      }
  } catch(e) {}
}
</script>
</body>
</html>
